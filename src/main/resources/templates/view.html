<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오 상세 - [[${item.title}]]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .detail-wrapper {
            max-width: 900px;
            margin: 3rem auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            animation: fadeInUp 0.8s ease backwards;
        }

        .view-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .view-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 1rem 0;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .view-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .meta-label {
            font-weight: 600;
            color: var(--text-main);
        }

        .tech-badges {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .view-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-main);
            min-height: 300px;
        }

        /* Quill content overrides */
        .view-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 1.5rem 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .view-content h1, .view-content h2, .view-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .view-actions {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }
        
        .btn-back:hover {
            color: var(--primary-color);
        }

        .admin-controls {
            display: flex;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .detail-wrapper {
                margin: 1rem;
                padding: 1.5rem;
            }
            .view-title { font-size: 1.6rem; }
            .view-meta { flex-direction: column; gap: 0.5rem; }
            .view-actions { flex-direction: column; gap: 1.5rem; align-items: stretch; text-align: center; }
            .admin-controls { justify-content: center; width: 100%; }
        }
    </style>
    
    <!-- Google Analytics -->
    <script th:if="${@environment.getProperty('GA_ID')}" async th:src="'https://www.googletagmanager.com/gtag/js?id=' + ${@environment.getProperty('GA_ID')}"></script>
    <script th:if="${@environment.getProperty('GA_ID')}" th:inline="javascript">
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', /*[[${@environment.getProperty('GA_ID')}]]*/ 'G-XXXXXXXXXX');
    </script>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo" onclick="location.href='/'">MY PORTFOLIO</div>
        </div>
    </header>

    <main class="main-content">
        <div class="detail-wrapper">
            <div class="view-header">
                <h1 class="view-title" th:text="${item.title}">프로젝트 제목</h1>
                
                <div class="view-meta">
                    <div class="meta-item">
                        <span class="meta-label">카테고리:</span>
                        <span th:text="${item.category}">웹 애플리케이션</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">진행 기간:</span>
                        <span>[[${item.startDate}]] ~ [[${item.endDate}]]</span>
                    </div>
                </div>

                <div class="tech-badges">
                    <span class="tech-badge" th:each="tech : ${#strings.arraySplit(item.techStack, ',')}" th:text="${#strings.trim(tech)}">Java</span>
                </div>
            </div>

            <!-- 에디터로 작성한 HTML 원본을 그대로 렌더링 -->
            <div class="view-content" th:utext="${item.content}">
                여기에 내용이 출력됩니다.
            </div>

            <div class="view-actions">
                <a href="/" class="btn-back">← 목록으로 돌아가기</a>
                
                <div class="admin-controls" sec:authorize="isAuthenticated()">
                    <a th:href="@{/edit/{id}(id=${item.id})}" class="btn btn-primary">수정하기</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
