<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세 정보 - Portfolio.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Quill WYSIWYG Editor (v2) -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <!-- Quill Blot Formatter for Drag Handles -->
    <script src="https://cdn.jsdelivr.net/npm/quill-blot-formatter@1.0.5/dist/quill-blot-formatter.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        .form-section { padding-top: 100px; max-width: 900px; margin: 0 auto; padding-bottom: 4rem; }
        .form-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 2.5rem;
            animation: fadeInUp 0.5s ease backwards;
        }
        .form-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); }
        .form-group input, .form-group select {
            width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color);
            border-radius: 8px; font-family: inherit; font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--primary-color);
        }
        #editor-container {
            height: 400px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        .ql-toolbar {
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .actions { text-align: right; margin-top: 2rem; display: flex; gap: 10px; justify-content: flex-end; }
        .actions .btn-save { background-color: var(--primary-color); color: white; padding: 0.8rem 2rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600;}
        .actions .btn-cancel { background-color: #f1f5f9; color: var(--text-main); padding: 0.8rem 2rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; text-decoration: none;}
        
        @media (max-width: 768px) {
            .header { position: relative; }
            .form-section { padding-top: 40px; padding-left: 1rem; padding-right: 1rem; }
            .form-row { flex-direction: column; gap: 1.5rem; }
            .form-container { padding: 1.5rem; }
            #editor-container { height: 300px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">Portfolio.</a>
        </div>
    </header>

    <main class="form-section">
        <div class="form-container">
            <h2 th:text="${item.id == null ? '새 프로젝트 등록' : '프로젝트 수정'}">프로젝트 등록/수정</h2>
            <form id="portfolio-form">
                <input type="hidden" id="id" th:value="${item.id}">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>년도</label>
                        <input type="text" id="year" th:value="${item.year}" required placeholder="예: 2026">
                    </div>
                    <div class="form-group">
                        <label>분류</label>
                        <select id="category">
                            <option value="자바" th:selected="${item.category == '자바'}">자바</option>
                            <option value="파워빌더" th:selected="${item.category == '파워빌더'}">파워빌더</option>
                            <option value="C#" th:selected="${item.category == 'C#'}">C#</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>프로젝트 제목</label>
                    <input type="text" id="title" th:value="${item.title}" required placeholder="예: 차세대 시스템 구축">
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>기술 스택</label>
                    <input type="text" id="techStack" th:value="${item.techStack}" required placeholder="예: 자바, Spring Boot">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>시작일</label>
                        <input type="text" id="startDate" th:value="${item.startDate}" required placeholder="예: 2026.01">
                    </div>
                    <div class="form-group">
                        <label>종료일</label>
                        <input type="text" id="endDate" th:value="${item.endDate}" required placeholder="예: 2026.05">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1.5rem;">
                    <label>상세 내용 (이미지 첨부 지원)</label>
                    <div id="editor-container"></div>
                </div>

                <div class="actions">
                    <a href="/" class="btn-cancel">취소</a>
                    <button type="submit" class="btn-save" id="save-btn">저장</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Content to load into Quill -->
    <div id="initial-content" style="display: none;" th:utext="${item.content}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Register Image Resize Module
            Quill.register("modules/blotFormatter", QuillBlotFormatter.default);

            // Initialize Quill
            const quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    blotFormatter: {},
                    toolbar: {
                        container: [
                            [{ 'header': [1, 2, 3, false] }],
                            [{ 'color': [] }, { 'background': [] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            ['image', 'link', 'blockquote'],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            ['clean']
                        ]
                    }
                }
            });

            // Load initial content
            const initialHtml = document.getElementById('initial-content').innerHTML;
            if(initialHtml) {
                quill.clipboard.dangerouslyPasteHTML(initialHtml);
            }



            // Form Submit
            const form = document.getElementById('portfolio-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const sDate = document.getElementById('startDate').value.trim();
                const eDate = document.getElementById('endDate').value.trim();
                const regex = /^\d{4}\.(0[1-9]|1[0-2])$/;
                
                if (!regex.test(sDate) || !regex.test(eDate)) {
                    alert('일자를 확인해주세요. (형식: YYYY.MM)');
                    return;
                }
                
                const idVal = document.getElementById('id').value;
                const payload = {
                    id: idVal ? parseInt(idVal) : null,
                    year: document.getElementById('year').value,
                    title: document.getElementById('title').value,
                    techStack: document.getElementById('techStack').value,
                    startDate: document.getElementById('startDate').value,
                    endDate: document.getElementById('endDate').value,
                    category: document.getElementById('category').value,
                    content: quill.root.innerHTML
                };

                const saveBtn = document.getElementById('save-btn');
                saveBtn.innerText = '저장 중...';
                saveBtn.disabled = true;

                try {
                    const response = await fetch('/api/portfolio', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if(response.ok) {
                        alert('저장되었습니다.');
                        location.href = '/';
                    } else {
                        alert('저장에 실패했습니다.');
                    }
                } catch(e) {
                    console.error(e);
                    alert('에러가 발생했습니다.');
                } finally {
                    saveBtn.innerText = '저장';
                    saveBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
