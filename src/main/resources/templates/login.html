<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--glass-border);
            animation: fadeInUp 0.8s ease backwards;
        }
        .login-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: var(--text-main);
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1px solid transparent;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            background-color: #f1f5f9;
            color: var(--text-main);
            transition: var(--transition-normal);
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            background-color: #ffffff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-normal);
            margin-top: 1rem;
        }
        .btn-login:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
            background: #fef2f2;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h1 class="login-title">관리자 접속</h1>
        
        <div th:if="${param.error}" class="error-msg">
            아이디 또는 비밀번호가 일치하지 않습니다.
        </div>
        <div th:if="${param.logout}" class="error-msg" style="color: #059669; background: #ecfdf5; border-color: #a7f3d0;">
            성공적으로 로그아웃 되었습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
        
        <a href="/" class="back-link">← 포트폴리오 메인으로 돌아가기</a>
    </div>
</body>
</html>
