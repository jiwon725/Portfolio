<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo">Portfolio.</a>
            <nav class="nav-menu">
                <a href="#" class="nav-link active">전체</a>
                <a href="#" class="nav-link">파워빌더</a>
                <a href="#" class="nav-link">자바</a>
                <a href="#" class="nav-link">C#</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="hero-section">
            <h1 class="hero-title">Welcome to my workspace</h1>
            <p class="hero-subtitle">깔끔하고 모던한 프로젝트 아카이브</p>
        </section>

        <section class="filter-section">
            <div class="filter-container">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>년도</label>
                        <select id="filter-year">
                            <option value="">전체</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>카테고리</label>
                        <select id="filter-category">
                            <option value="">전체</option>
                        </select>
                    </div>
                    <div class="filter-group" style="flex: 2;">
                        <label>프로젝트명</label>
                        <input type="text" id="filter-title" placeholder="프로젝트명 검색">
                    </div>
                    <div class="filter-group" style="flex: 2.5; min-width: 220px;">
                        <label>기간</label>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <input type="text" id="filter-start" placeholder="YYYY.MM">
                            <span style="color: var(--text-muted); font-weight: 600;">~</span>
                            <input type="text" id="filter-end" placeholder="YYYY.MM">
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button type="button" class="btn btn-secondary" id="btn-reset">초기화</button>
                        <button type="button" class="btn btn-primary" id="btn-search">조회</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="board-actions" sec:authorize="isAuthenticated()">
            <a href="/detail/new" class="btn btn-primary">등록</a>
            <button type="button" class="btn btn-danger" id="delete-btn">삭제</button>
        </div>

        <section class="board-section">
            <div class="board-container">
                <div class="board-header">
                    <div class="col col-chk" sec:authorize="isAuthenticated()"><input type="checkbox" id="chk-all"></div>
                    <div class="col col-year">년도</div>
                    <div class="col col-title">프로젝트명</div>
                    <div class="col col-tech">기술 스택</div>
                    <div class="col col-date">작업 기간</div>
                </div>
                <div id="portfolio-board">
                    <!-- Data will be loaded here via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 2rem; margin-top: 3rem; border-top: 1px solid var(--border-color);">
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;">&copy; 2026 My Portfolio. All rights reserved.</p>
        
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; transition: color 0.2s;">관리자 접속</a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" style="background: none; border: none; color: var(--primary-color); cursor: pointer; font-size: 0.85rem; font-weight: 600; padding: 0;">로그아웃</button>
            </form>
        </div>
    </footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
