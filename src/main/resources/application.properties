spring.application.name=portfolio
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/portfoliodb;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Spring Security Admin Credentials
spring.security.user.name=admin
spring.security.user.password=1
spring.security.user.roles=ADMIN
